<h3>{{ message }}</h3>
<div class="form-group">
  <form (ngSubmit)="register()" [formGroup]="registerForm">
    <div class="input-group">
      <label for="username" class="input-group">Login: </label>
      <input
        type="text"
        placeholder="Username"
        name="username"
        formControlName="username"
        required
      />

      @let username = registerForm.get('username');
      @if ((username?.dirty && username?.invalid) || message) {
        <div class="error">* Username is Mandatory</div>
      }
    </div>

    <div class="input-group">
      <label for="password" class="input-group">Password: </label>
      <input
        type="text"
        placeholder="Password"
        name="password"
        formControlName="password"
        required
      />

      @let password = registerForm.get('password');
      @if ((password?.dirty && password?.invalid) || message) {
        <div class="error">* Password is Mandatory</div>
      }
    </div>
    <div class="row">
      <button [disabled]="registerForm.invalid">Register</button>
    </div>
  </form>
</div>
