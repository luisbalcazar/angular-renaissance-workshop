<div
  class="min-w-72 border border-black rounded-md p-2.5 inline-block"
  [class.text-white]="isHeroVillain()"
  [class.bg-rebeccapurple]="isHeroVillain()"
>
  <div class="flex justify-between">
    <img [src]="hero().image" alt="Hero" />
  </div>
  <div class="text-center">
    <div class="font-bold text-[1.4rem]">{{ hero().name }}</div>
  </div>
  @for (item of hero().powerstats | keyvalue; track item.key) {
    <div class="flex justify-between">
      <span>{{ item.key }}: {{ hero().powerstats[item.key] }}</span>
      <div>
        <button
          (click)="incrementPowerstat(item.key)"
          [disabled]="hero().powerstats[item.key] === 100"
          class="btn btn-gray text-sm"
        >
          +
        </button>
        <button
          (click)="decrementPowerstat(item.key)"
          [disabled]="hero().powerstats[item.key] === 0"
          class="btn btn-gray text-sm"
        >
          -
        </button>
      </div>
    </div>
  }

  <hr class="m-4 border-amber-600" />
  <span class="btn btn-gray mr-2 text-xl" [routerLink]="['/hero', 'update', hero().id]">
    Update
  </span>
  <span class="btn btn-blue text-xl" [routerLink]="['/hero', hero().id]">View </span>
  <span class="btn btn-red text-xl" (click)="remove(hero())">Remove </span>
</div>
